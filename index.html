<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>DDG サンプル貸出管理</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--p:#2563eb;--s:#16a34a;--w:#d97706;--d:#dc2626;--g1:#f3f4f6;--g2:#e5e7eb;--g3:#d1d5db;--g5:#6b7280;--g7:#374151;--g9:#111827}
body{font-family:Meiryo,sans-serif;background:var(--g1);color:var(--g9)}
#ls{display:flex;align-items:center;justify-content:center;height:100vh;background:linear-gradient(135deg,#1e3a8a,#2563eb)}
.lc{background:#fff;border-radius:16px;padding:40px;width:360px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.lc h1{font-size:18px;font-weight:700;margin-bottom:8px}.lc p{font-size:13px;color:var(--g5);margin-bottom:24px}
.lc label{display:block;font-size:13px;font-weight:600;margin-bottom:6px}
.lc input{width:100%;padding:10px;border:1.5px solid var(--g3);border-radius:8px;font-size:15px}
.err{color:var(--d);font-size:13px;margin-top:8px;min-height:18px}
.lbtn{width:100%;margin-top:16px;padding:12px;background:var(--p);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer}
#app{display:none}
header{background:#fff;padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--g2);position:sticky;top:0;z-index:10}
header h2{color:var(--p);font-size:18px;font-weight:700}
.btn{padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none}
.bp{background:var(--p);color:#fff}.bs{background:var(--g1);color:var(--g7);border:1px solid var(--g3)}
.bw{background:var(--w);color:#fff}.bg{background:var(--s);color:#fff}.bd{background:var(--d);color:#fff}
.bsm{padding:5px 10px;font-size:12px}
.main{padding:20px;max-width:1400px;margin:0 auto}
.tabs{display:flex;border-bottom:2px solid var(--g2)}
.tab-btn{padding:12px 24px;border:none;background:none;font-size:14px;font-weight:600;cursor:pointer;color:var(--g5);border-bottom:2px solid transparent;margin-bottom:-2px}
.tab-btn.active{color:var(--p);border-bottom-color:var(--p)}
.tab-content{padding:20px 0}
.card{background:#fff;border-radius:12px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.si{padding:8px 12px;border:1.5px solid var(--g3);border-radius:8px;font-size:13px;min-width:200px}
.stats{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.stat{background:#fff;border-radius:10px;padding:12px 16px;flex:1;min-width:100px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.stat .n{font-size:22px;font-weight:700}.stat .l{font-size:12px;color:var(--g5)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--g1);padding:10px 8px;text-align:left;font-weight:600;color:var(--g7);border-bottom:2px solid var(--g2);white-space:nowrap}
td{padding:8px;border-bottom:1px solid var(--g2);vertical-align:middle}
tr:hover td{background:#f8faff}
.tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.tag-lent{background:#dbeafe;color:#1d4ed8}
.tag-returned{background:#dcfce7;color:#15803d}
.tag-overdue{background:#fee2e2;color:#b91c1c}
.tag-avail{background:#f0fdf4;color:#15803d}
.thumb{width:56px;height:44px;object-fit:cover;border-radius:6px;cursor:pointer;border:1px solid var(--g2)}
.no-thumb{width:56px;height:44px;background:var(--g1);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--g5);border:1px solid var(--g2);text-align:center}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center}
.overlay.show{display:flex}
.modal{background:#fff;border-radius:16px;padding:24px;width:560px;max-width:95vw;max-height:90vh;overflow-y:auto;position:relative}
.modal h3{font-size:16px;font-weight:700;margin-bottom:16px}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:12px;font-weight:600;color:var(--g7);margin-bottom:4px}
.fc{width:100%;padding:8px 10px;border:1.5px solid var(--g3);border-radius:8px;font-size:13px}
.fc:focus{outline:none;border-color:var(--p)}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-foot{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.img-preview{text-align:center;margin:8px 0}
.img-preview img{max-width:100%;max-height:160px;border-radius:8px;object-fit:contain}
.gv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.gc{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08);transition:transform .15s}
.gc:hover{transform:translateY(-2px)}
.gc-img{width:100%;height:130px;object-fit:cover;background:var(--g1);cursor:pointer}
.gc-body{padding:8px}
.gc-code{font-size:11px;color:var(--g5);margin-bottom:2px}
.gc-name{font-size:12px;font-weight:600;line-height:1.3}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1f2937;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.img-modal{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:none;align-items:center;justify-content:center;cursor:zoom-out}
.img-modal.show{display:flex}
.img-modal img{max-width:90vw;max-height:90vh;border-radius:8px}
.close-btn{position:absolute;top:10px;right:14px;background:none;border:none;font-size:22px;cursor:pointer;color:var(--g5)}
.lend-prev{display:flex;align-items:center;gap:12px;background:#f0f9ff;border:1px solid #bae6fd;border-radius:8px;padding:10px;margin-bottom:12px}
.lend-prev img{width:72px;height:56px;object-fit:cover;border-radius:6px;flex-shrink:0}
.lend-prev .lp-code{font-weight:700;color:var(--p);font-size:13px}
.lend-prev .lp-name{font-size:12px;color:var(--g7);margin-top:2px}
</style></head>
<body>

<div id="ls">
  <div class="lc">
    <h1>&#128274; DDG サンプル管理</h1>
    <p>ログインしてください</p>
    <label>パスワード</label>
    <input type="password" id="pw" onkeydown="if(event.key==='Enter')login()" placeholder="パスワードを入力">
    <div class="err" id="pe"></div>
    <button class="lbtn" onclick="login()">ログイン</button>
  </div>
</div>

<div id="app">
  <header>
    <h2>DDG サンプル管理</h2>
    <div style="display:flex;gap:8px">
      <button class="btn bs bsm" onclick="expLedgerCSV()">&#128229; 台帳CSV</button>
      <button class="btn bs bsm" onclick="logout()">ログアウト</button>
    </div>
  </header>
  <div class="main">
    <div class="tabs">
      <button class="tab-btn active" id="tab1" onclick="switchTab(1)">&#128203; サンプル一覧表</button>
      <button class="tab-btn" id="tab2" onclick="switchTab(2)">&#128218; 貸出台帳</button>
    </div>
    <div id="page1" class="tab-content">
      <div class="stats">
        <div class="stat"><div class="n" id="sc-total">-</div><div class="l">総サンプル数</div></div>
        <div class="stat"><div class="n" style="color:var(--w)" id="sc-lent">-</div><div class="l">貸出中</div></div>
        <div class="stat"><div class="n" style="color:var(--d)" id="sc-over">-</div><div class="l">延滞</div></div>
        <div class="stat"><div class="n" style="color:var(--s)" id="sc-avail">-</div><div class="l">在庫あり</div></div>
      </div>
      <div class="toolbar">
        <input class="si" id="sq" placeholder="品番・製品名で検索…" oninput="renderSamples()">
        <select class="si" id="scf" onchange="renderSamples()" style="min-width:160px"><option value="">全カテゴリ</option></select>
        <select class="si" id="ssf" onchange="renderSamples()" style="min-width:120px">
          <option value="">全ステータス</option>
          <option value="lent">貸出中</option>
          <option value="overdue">延滞</option>
          <option value="avail">在庫あり</option>
        </select>
        <button class="btn bs bsm" id="gv-btn" onclick="toggleGallery()">&#128444; ギャラリー表示</button>
        <button class="btn bp bsm" onclick="openAddSample()">＋ サンプル追加</button>
      </div>
      <div id="s-gallery" class="gv-grid" style="display:none;margin-bottom:16px"></div>
      <div class="card" id="s-table-wrap" style="overflow-x:auto">
        <table>
          <thead><tr>
            <th style="width:64px">画像</th><th>品番</th><th>製品名</th><th>カテゴリ</th><th>貸出状況</th><th>操作</th>
          </tr></thead>
          <tbody id="s-body"></tbody>
        </table>
      </div>
    </div>
    <div id="page2" class="tab-content" style="display:none">
      <div class="toolbar">
        <input class="si" id="lq" placeholder="品番・貸出先・担当者で検索…" oninput="renderLedger()">
        <select class="si" id="lf" onchange="renderLedger()" style="min-width:120px">
          <option value="">全ステータス</option>
          <option value="lent">貸出中</option>
          <option value="overdue">延滞</option>
          <option value="returned">返却済</option>
        </select>
        <button class="btn bp bsm" onclick="openAddLend()">＋ 貸出登録</button>
      </div>
      <div class="card" style="overflow-x:auto">
        <table>
          <thead><tr>
            <th style="width:64px">画像</th><th>品番</th><th>製品名</th><th>貸出先／宛先</th><th>DDG担当</th><th>貸出日</th><th>返却予定</th><th>返却日</th><th>ステータス</th><th>備考</th><th>操作</th>
          </tr></thead>
          <tbody id="l-body"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="overlay" id="sm-ov" onclick="if(event.target===this)closeSM()">
  <div class="modal">
    <button class="close-btn" onclick="closeSM()">&#10005;</button>
    <h3 id="sm-title">サンプル追加</h3>
    <input type="hidden" id="sm-id">
    <div class="fg"><label>品番 *</label><input class="fc" id="sm-code" placeholder="SG-22-S167-12"></div>
    <div class="fg"><label>製品名</label><input class="fc" id="sm-name" placeholder="製品名"></div>
    <div class="fg"><label>カテゴリ</label><input class="fc" id="sm-cat" placeholder="カテゴリ"></div>
    <div class="fg"><label>画像ファイル</label>
      <input type="file" class="fc" id="sm-img" accept="image/*" onchange="prevSMImg()">
      <div id="sm-imgp" class="img-preview" style="display:none"><img id="sm-imgi" src="" alt=""></div>
    </div>
    <div class="modal-foot">
      <button class="btn bs" onclick="closeSM()">キャンセル</button>
      <button class="btn bp" onclick="saveSample()">保存</button>
    </div>
  </div>
</div>

<div class="overlay" id="lm-ov" onclick="if(event.target===this)closeLM()">
  <div class="modal">
    <button class="close-btn" onclick="closeLM()">&#10005;</button>
    <h3 id="lm-title">貸出登録</h3>
    <input type="hidden" id="lm-id">
    <div class="fg">
      <label>品番 *（入力するとサンプル情報を自動表示）</label>
      <input class="fc" id="lm-code" list="lm-codes" placeholder="SG-25-S145-1" oninput="lookupCode()">
      <datalist id="lm-codes"></datalist>
    </div>
    <div id="lm-prev" class="lend-prev" style="display:none">
      <img id="lm-prev-img" src="" alt="" onerror="this.style.display='none'">
      <div><div class="lp-code" id="lm-prev-code"></div><div class="lp-name" id="lm-prev-name"></div></div>
    </div>
    <div class="fg-row">
      <div class="fg"><label>貸出先 *</label><input class="fc" id="lm-co" placeholder="会社名"></div>
      <div class="fg"><label>宛先</label><input class="fc" id="lm-addr" placeholder="担当者名"></div>
    </div>
    <div class="fg-row">
      <div class="fg"><label>DDG担当者</label><input class="fc" id="lm-staff" placeholder="担当者"></div>
      <div class="fg"><label>数量</label><input class="fc" id="lm-qty" type="number" value="1" min="1"></div>
    </div>
    <div class="fg-row">
      <div class="fg"><label>貸出日 *</label><input class="fc" id="lm-ldt" type="date"></div>
      <div class="fg"><label>返却予定日</label><input class="fc" id="lm-ldue" type="date"></div>
    </div>
    <div class="fg-row" id="lm-retfields" style="display:none">
      <div class="fg"><label>返却確認日</label><input class="fc" id="lm-retconf" type="date"></div>
      <div class="fg"><label>返却日</label><input class="fc" id="lm-retdt" type="date"></div>
    </div>
    <div class="fg"><label>プロジェクト名</label><input class="fc" id="lm-proj" placeholder="プロジェクト名"></div>
    <div class="fg"><label>備考</label><textarea class="fc" id="lm-note" rows="2" placeholder="備考"></textarea></div>
    <div class="modal-foot">
      <button class="btn bs" onclick="closeLM()">キャンセル</button>
      <button class="btn bp" onclick="saveLend()">保存</button>
    </div>
  </div>
</div>

<div class="img-modal" id="img-modal" onclick="this.classList.remove('show')">
  <img id="img-modal-src" src="" alt="">
</div>
<div class="toast" id="toast"></div>

var _tab=1,_gv=false;

function lds(){return JSON.parse(localStorage.getItem('ddg_s')||'[]');}
function ldl(){return JSON.parse(localStorage.getItem('ddg_l')||'[]');}
function svs(d){localStorage.setItem('ddg_s',JSON.stringify(d));}
function svl(d){localStorage.setItem('ddg_l',JSON.stringify(d));}
function td(){return new Date().toISOString().slice(0,10);}
function rid(){return Math.random().toString(36).slice(2,9);}
function esc(s){return(s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function seedData(){
  if(!lds().length) svs(SS);
  if(!ldl().length) svl(SL);
}

function login(){
  if(document.getElementById('pw').value==='ddg2024'){
    sessionStorage.setItem('ddg_ok','1');
    document.getElementById('ls').style.display='none';
    document.getElementById('app').style.display='block';
    init();
  } else {
    document.getElementById('pe').textContent='パスワードが違います';
  }
}
function logout(){sessionStorage.removeItem('ddg_ok');location.reload();}
function toast(m,t){
  var el=document.getElementById('toast');
  el.textContent=m;el.style.background=t==='e'?'#dc2626':'#1f2937';
  el.classList.add('show');setTimeout(function(){el.classList.remove('show');},2500);
}

function init(){
  seedData();
  fillCodeList();
  fillCatFilter();
  renderSamples();
}

function fillCodeList(){
  var dl=document.getElementById('lm-codes');
  dl.innerHTML='';
  lds().forEach(function(s){
    var o=document.createElement('option');o.value=s.code;dl.appendChild(o);
  });
}

function fillCatFilter(){
  var cats={};
  lds().forEach(function(s){if(s.cat)cats[s.cat]=1;});
  var sel=document.getElementById('scf');
  sel.innerHTML='<option value="">全カテゴリ</option>';
  Object.keys(cats).sort().forEach(function(c){
    var o=document.createElement('option');o.value=c;o.textContent=c;sel.appendChild(o);
  });
}

function sampleStatus(code){
  var t=td();
  var recs=ldl().filter(function(r){return r.code.trim().toLowerCase()===code.trim().toLowerCase()&&!r.retDt;});
  if(!recs.length) return 'avail';
  var over=recs.some(function(r){return r.ldue&&r.ldue<t;});
  return over?'overdue':'lent';
}

function ledgSt(r,t){
  if(r.retDt) return 'returned';
  if(r.ldue&&r.ldue<t) return 'overdue';
  return 'lent';
}

function stTag(st){
  if(st==='lent') return '<span class="tag tag-lent">貸出中</span>';
  if(st==='overdue') return '<span class="tag tag-overdue">延滞</span>';
  return '<span class="tag tag-avail">在庫あり</span>';
}

function renderSamples(){
  var q=(document.getElementById('sq').value||'').toLowerCase();
  var cf=document.getElementById('scf').value;
  var sf=document.getElementById('ssf').value;
  var samples=lds();
  var total=0,lent=0,over=0,avail=0;
  samples.forEach(function(s){
    total++;
    var st=sampleStatus(s.code);
    if(st==='lent')lent++;else if(st==='overdue')over++;else avail++;
  });
  document.getElementById('sc-total').textContent=total;
  document.getElementById('sc-lent').textContent=lent;
  document.getElementById('sc-over').textContent=over;
  document.getElementById('sc-avail').textContent=avail;

  var filtered=samples.filter(function(s){
    if(q&&!(s.code+s.name+s.cat).toLowerCase().includes(q))return false;
    if(cf&&s.cat!==cf)return false;
    if(sf){var st=sampleStatus(s.code);if(st!==sf)return false;}
    return true;
  });

  if(_gv){
    document.getElementById('s-table-wrap').style.display='none';
    document.getElementById('s-gallery').style.display='grid';
    document.getElementById('gv-btn').textContent='三 リスト表示';
    document.getElementById('s-gallery').innerHTML=filtered.map(function(s){
      var st=sampleStatus(s.code);
      var imgH=s.img
        ?'<img class="gc-img" src="'+esc(s.img)+'" alt="" onclick="zoomImg(\''+esc(s.img)+'\')" onerror="this.parentNode.innerHTML=\'<div class=gc-img style=display:flex;align-items:center;justify-content:center;font-size:11px;color:#6b7280>No IMG</div>\'">'
        :'<div class="gc-img" style="display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--g5)">No IMG</div>';
      return '<div class="gc">'+imgH+'<div class="gc-body"><div class="gc-code">'+esc(s.code)+'</div><div class="gc-name">'+esc(s.name||s.cat||'')+'</div><div style="margin-top:4px">'+stTag(st)+'</div></div></div>';
    }).join('');
  } else {
    document.getElementById('s-gallery').style.display='none';
    document.getElementById('s-table-wrap').style.display='block';
    document.getElementById('gv-btn').textContent='&#128444; ギャラリー表示';
    document.getElementById('s-body').innerHTML=filtered.map(function(s){
      var st=sampleStatus(s.code);
      var imgH=s.img
        ?'<img class="thumb" src="'+esc(s.img)+'" alt="" onclick="zoomImg(\''+esc(s.img)+'\')" onerror="this.outerHTML=\'<div class=no-thumb>No IMG</div>\'">'
        :'<div class="no-thumb">No IMG</div>';
      return '<tr><td>'+imgH+'</td>'
        +'<td style="font-weight:600;white-space:nowrap">'+esc(s.code)+'</td>'
        +'<td style="max-width:220px">'+esc(s.name||'')+'</td>'
        +'<td style="color:var(--g5);font-size:12px;max-width:160px">'+esc(s.cat||'')+'</td>'
        +'<td>'+stTag(st)+'</td>'
        +'<td style="white-space:nowrap">'
        +'<button class="btn bs bsm" onclick="openEditSample(\''+s.id+'\')" style="margin-right:4px">編集</button>'
        +'<button class="btn bw bsm" onclick="openAddLendCode(\''+esc(s.code)+'\')">貸出</button>'
        +'</td></tr>';
    }).join('');
  }
}

function renderLedger(){
  var q=(document.getElementById('lq').value||'').toLowerCase();
  var lf=document.getElementById('lf').value;
  var t=td();
  var sm={};
  lds().forEach(function(s){sm[s.code.trim().toLowerCase()]=s;});
  var rows=ldl().filter(function(r){
    var st=ledgSt(r,t);
    if(lf&&st!==lf)return false;

  });
  rows.sort(function(a,b){if(a.isExample&&!b.isExample)return -1;if(!a.isExample&&b.isExample)return 1;return(b.ldt||'').localeCompare(a.ldt||'');});
  document.getElementById('l-body').innerHTML=rows.map(function(r){
    var st=ledgSt(r,t);
    var stag=st==='returned'?'<span class="tag tag-returned">返却済</span>':st==='overdue'?'<span class="tag tag-overdue">延滞</span>':'<span class="tag tag-lent">貸出中</span>';
    var s=sm[r.code.trim().toLowerCase()];
    var imgH=s&&s.img
      ?'<img class="thumb" src="'+esc(s.img)+'" alt="" onclick="zoomImg(\''+esc(s.img)+'\')" onerror="this.outerHTML=\'<div class=no-thumb>No IMG</div>\'">'
      :'<div class="no-thumb">No IMG</div>';
    var sname=s?s.name:r.glassType||'';
    return '<tr'+(r.isExample?' style="background:#fffbeb;border-left:3px solid var(--w)"':'')+'>'
      +'<td>'+imgH+'</td>'
      +'<td style="font-weight:600;white-space:nowrap">'+esc(r.code)+'</td>'
      +'<td style="max-width:180px;font-size:12px">'+esc(sname)+'</td>'
      +'<td>'+esc(r.co)+'<br><span style="font-size:11px;color:var(--g5)">'+esc(r.addr)+'</span></td>'
      +'<td>'+esc(r.staff)+'</td>'
      +'<td style="white-space:nowrap">'+esc(r.ldt)+'</td>'
      +'<td style="white-space:nowrap">'+esc(r.ldue)+'</td>'
      +'<td style="white-space:nowrap">'+esc(r.retDt)+'</td>'
      +'<td>'+stag+'</td>'
      +'<td style="max-width:160px;font-size:12px;color:var(--g5)">'+esc(r.note)+'</td>'
      +'<td style="white-space:nowrap">'
        +'<button class="btn bs bsm" onclick="openEditLend(\''+r.id+'\')" style="margin-right:4px">編集</button>'
        +(st!=='returned'?'<button class="btn bg bsm" onclick="markReturn(\''+r.id+'\')">返却</button>':'')
      +'</td>'
      +'</tr>';
  }).join('');
}

function switchTab(n){
  _tab=n;
  [1,2].forEach(function(i){
    document.getElementById('page'+i).style.display=i===n?'block':'none';
    document.getElementById('tab'+i).classList.toggle('active',i===n);
  });
  if(n===1)renderSamples();
  if(n===2)renderLedger();
}

function toggleGallery(){_gv=!_gv;renderSamples();}

function zoomImg(src){
  document.getElementById('img-modal-src').src=src;
  document.getElementById('img-modal').classList.add('show');
}

function openAddSample(){
  document.getElementById('sm-title').textContent='サンプル追加';
  document.getElementById('sm-id').value='';
  ['sm-code','sm-name','sm-cat'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('sm-imgp').style.display='none';
  document.getElementById('sm-ov').classList.add('show');
}
function openEditSample(id){
  var s=lds().find(function(x){return x.id===id;});if(!s)return;
  document.getElementById('sm-title').textContent='サンプル編集';
  document.getElementById('sm-id').value=s.id;
  document.getElementById('sm-code').value=s.code||'';
  document.getElementById('sm-name').value=s.name||'';
  document.getElementById('sm-cat').value=s.cat||'';
  if(s.img){document.getElementById('sm-imgi').src=s.img;document.getElementById('sm-imgp').style.display='block';}
  else{document.getElementById('sm-imgp').style.display='none';}
  document.getElementById('sm-ov').classList.add('show');
}
function closeSM(){document.getElementById('sm-ov').classList.remove('show');}
function prevSMImg(){
  var f=document.getElementById('sm-img').files[0];if(!f)return;
  if(f.size>5242880){toast('画像は5MB以下にしてください','e');return;}
  var r=new FileReader();
  r.onload=function(ev){document.getElementById('sm-imgi').src=ev.target.result;document.getElementById('sm-imgp').style.display='block';};
  r.readAsDataURL(f);
}
function saveSample(){
  var code=document.getElementById('sm-code').value.trim();
  if(!code){toast('品番は必須です','e');return;}
  var samples=lds(),id=document.getElementById('sm-id').value;
  var imgFile=document.getElementById('sm-img').files[0];
  function doSave(imgSrc){
    if(id){
      samples=samples.map(function(s){
        if(s.id!==id)return s;
        return Object.assign({},s,{code:code,name:document.getElementById('sm-name').value.trim(),cat:document.getElementById('sm-cat').value.trim(),img:imgSrc!==undefined?imgSrc:s.img});
      });
    }else{
      samples.push({id:rid(),code:code,name:document.getElementById('sm-name').value.trim(),cat:document.getElementById('sm-cat').value.trim(),img:imgSrc||'',at:new Date().toISOString()});
    }
    svs(samples);fillCodeList();fillCatFilter();renderSamples();closeSM();toast('保存しました');
  }
  if(imgFile){var rdr=new FileReader();rdr.onload=function(ev){doSave(ev.target.result);};rdr.readAsDataURL(imgFile);}
  else{doSave(undefined);}
}

function openAddLend(){
  document.getElementById('lm-title').textContent='貸出登録';
  document.getElementById('lm-id').value='';
  ['lm-code','lm-co','lm-addr','lm-staff','lm-proj','lm-note'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('lm-qty').value=1;
  document.getElementById('lm-ldt').value=td();
  ['lm-ldue','lm-retconf','lm-retdt'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('lm-prev').style.display='none';
  document.getElementById('lm-retfields').style.display='none';
  document.getElementById('lm-ov').classList.add('show');
}
function openAddLendCode(code){
  openAddLend();
  document.getElementById('lm-code').value=code;
  document.getElementById('lm-retfields').style.display='grid';
  lookupCode();
}
function openEditLend(id){
  var r=ldl().find(function(x){return x.id===id;});if(!r)return;
  document.getElementById('lm-title').textContent='貸出編集';
  document.getElementById('lm-id').value=r.id;
  document.getElementById('lm-code').value=r.code||'';
  document.getElementById('lm-co').value=r.co||'';
  document.getElementById('lm-addr').value=r.addr||'';
  document.getElementById('lm-staff').value=r.staff||'';
  document.getElementById('lm-proj').value=r.proj||'';
  document.getElementById('lm-note').value=r.note||'';
  document.getElementById('lm-qty').value=r.qty||1;
  document.getElementById('lm-ldt').value=r.ldt||'';
  document.getElementById('lm-ldue').value=r.ldue||'';
  document.getElementById('lm-retconf').value=r.retConf||'';
  document.getElementById('lm-retdt').value=r.retDt||'';
  lookupCode();
  document.getElementById('lm-ov').classList.add('show');
}
function closeLM(){document.getElementById('lm-ov').classList.remove('show');}
function lookupCode(){
  var code=(document.getElementById('lm-code').value||'').trim();
  if(!code){document.getElementById('lm-prev').style.display='none';return;}
  var s=lds().find(function(x){return x.code.trim().toLowerCase()===code.toLowerCase();});
  if(s){
    document.getElementById('lm-prev-code').textContent=s.code;
    document.getElementById('lm-prev-name').textContent=s.name||s.cat||'';
    var pi=document.getElementById('lm-prev-img');
    if(s.img){pi.src=s.img;pi.style.display='block';}else{pi.style.display='none';}
    document.getElementById('lm-prev').style.display='flex';
  }else{document.getElementById('lm-prev').style.display='none';}
}
function saveLend(){
  var code=document.getElementById('lm-code').value.trim();
  var co=document.getElementById('lm-co').value.trim();
  var ldt=document.getElementById('lm-ldt').value;
  if(!code){toast('品番は必須です','e');return;}
  if(!co){toast('貸出先は必須です','e');return;}
  if(!ldt){toast('貸出日は必須です','e');return;}
  var records=ldl(),id=document.getElementById('lm-id').value;
  var obj={id:id||rid(),code:code,co:co,
    addr:document.getElementById('lm-addr').value.trim(),
    staff:document.getElementById('lm-staff').value.trim(),
    proj:document.getElementById('lm-proj').value.trim(),
    glassType:'',note:document.getElementById('lm-note').value.trim(),
    ldt:ldt,ldue:document.getElementById('lm-ldue').value,
    retConf:document.getElementById('lm-retconf').value,
    retDt:document.getElementById('lm-retdt').value,
    qty:parseInt(document.getElementById('lm-qty').value)||1,
    at:new Date().toISOString()};
  if(id){records=records.map(function(r){return r.id===id?obj:r;});}else records.push(obj);
  svl(records);renderLedger();closeLM();toast('保存しました');
}
function markReturn(id){
  var records=ldl().map(function(r){return r.id===id?Object.assign({},r,{retDt:td()}):r;});
  svl(records);renderLedger();renderSamples();toast('返却済にしました');
}

function expLedgerCSV(){
  var t=td(),sm={};
  lds().forEach(function(s){sm[s.code.trim().toLowerCase()]=s;});
  var rows=[['品番','製品名','貸出先','宛先','DDG担当','貸出日','返却予定','返却日','ステータス','備考']];
  ldl().forEach(function(r){
    var st=ledgSt(r,t);
    var s=sm[r.code.trim().toLowerCase()];
    rows.push([r.code,s?s.name:r.glassType||'',r.co,r.addr,r.staff,r.ldt,r.ldue,r.retDt,
      st==='returned'?'返却済':st==='overdue'?'延滞':'貸出中',r.note]);
  });
  var bom='\uFEFF';
  var csv=bom+rows.map(function(r){return r.map(function(c){return '"'+(c||'').toString().replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='ledger_'+t+'.csv';a.click();
}

window.onload=function(){
  if(sessionStorage.getItem('ddg_ok')){
    document.getElementById('ls').style.display='none';
    document.getElementById('app').style.display='block';
    init();
  }
  document.getElementById('pw').focus();
};
